<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="libraryLogic.js" defer></script>
    <title>Library</title>
  </head>
  <body>
    <header>
      <h1>Library System</h1>
      <div></div>
      <button type="button" id="newBook">Add Book</button>
    </header>

    <main>
      <p class="noBooks">
        No books yet. <br />
        Add your first book to start building <br />
        your Library
      </p>

      <section class="book-grid hidden" id="bookCardGrid"></section>
    </main>

    <footer class="site-footer">
      <p>
        Built by
        <a
          href="https://github.com/Ali7488"
          target="_blank"
          rel="noopener noreferrer"
        >
          Mohannad Ali
        </a>
        . View
        <a
          href="https://github.com/Ali7488/LibraryProject"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub repo.</a
        >
      </p>
    </footer>

    <!--Template for the cards to be added-->
    <template id="bookCardTemplate">
      <div class="card">
        <div class="top">
          <p class="bookTitle">Example Book</p>
        </div>
        <div class="content">
          <p class="bookAuthor">
            <strong>Author:</strong> <span>Sample Author</span>
          </p>
          <p class="bookPages">
            <strong>No. of Pages: </strong>
            <span>1234</span>
          </p>
          <p class="bookRead">
            <strong>Status: </strong>
            <span>Read/Not Read</span>
          </p>
        </div>
        <div class="bottom">
          <button type="button" class="mark-btn">Mark as Read</button>
          <button type="button" class="delete-btn">Delete Book</button>
        </div>
      </div>
    </template>

    <!--Dialog for adding a book popup-->
    <dialog id="bookDialog">
      <form id="bookForm" class="dialogue-card">
        <fieldset>
          <legend>Add a Book</legend>

          <label for="bookTitleInput">Title</label>
          <input
            type="text"
            id="bookTitleInput"
            placeholder="e.g. The Hobbit"
            required
          />

          <label for="bookAuthorInput">Author</label>
          <input
            type="text"
            id="bookAuthorInput"
            placeholder="e.g.J.R.R. Tolkien"
            required
          />

          <label for="bookPagesInput">Pages</label>
          <input
            type="number"
            id="bookPagesInput"
            min="1"
            placeholder="e.g. 280"
            required
          />

          <label class="checkbox-row">
            <input type="checkbox" id="bookReadInput" />
            Already read
          </label>

          <div class="form-actions">
            <button type="button" id="cancelBookBtn" class="cancel">
              Cancel
            </button>
            <button type="submit" class="save">Save</button>
          </div>
          
        </fieldset>
      </form>
    </dialog>
  </body>
</html>
